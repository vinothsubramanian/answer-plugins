plugin:
  basic_connector:
    backend:
      name:
        other: basic
      info:
        name:
          other: OAuth2 Basic
        description:
          other: Generic OAuth2 Plugin
      config:
        name:
          title:
            other: Name
          description:
            other: Name of your connector which will be shown in the login page
        issuer_url:
          title:
            other: Issuer URL
          description:
            other: "Optional. OIDC provider issuer URL (e.g. https://accounts.google.com). When set, Authorize URL, Token URL, and User JSON URL are discovered automatically from {issuer}/.well-known/openid-configuration. Manual URL fields below take precedence when both are provided."
        client_id:
          title:
            other: ClientID
          description:
            other: Client ID of your application
        client_secret:
          title:
            other: ClientSecret
          description:
            other: Client secret of your application
        authorize_url:
          title:
            other: Authorize URL
          description:
            other: "Authorization endpoint of your OAuth2 provider. Optional when Issuer URL is set — overrides the discovered value when both are provided."
        token_url:
          title:
            other: Token URL
          description:
            other: "Token endpoint of your OAuth2 provider. Optional when Issuer URL is set — overrides the discovered value when both are provided."
        user_json_url:
          title:
            other: User JSON URL
          description:
            other: "URL to fetch user info from using the access token. Optional when Issuer URL is set — overrides the discovered userinfo endpoint when provided."
        user_id_json_path:
          title:
            other: User ID JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the user id. eg: user.id"
        user_display_name_json_path:
          title:
            other: User Display Name JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the user display name. eg: user.name"
        user_username_json_path:
          title:
            other: User Username JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the user username. eg: user.login"
        user_email_json_path:
          title:
            other: User Email JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the user email. eg: user.email"
        user_avatar_json_path:
          title:
            other: User Avatar JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the user avatar. eg: user.avatar_url"
        check_email_verified:
          title:
            other: Check Email Verified
          label:
            other: "The OAuth2 site has verified the email"
        email_verified_json_path:
          title:
            other: Email Verified JSON Path
          description:
            other: "Path in the OAuth2 User JSON to the email verified. eg: user.email_verified"
        scope:
          title:
            other: Scope
          description:
            other: "OAuth Scope of your application. Multiple scopes separated by `,` e.g. user.email,user.age"
        logo_svg:
          title:
            other: Logo SVG
          description:
            other: "SVG of your application logo which format is base64"
        enable_pkce:
          title:
            other: Enable PKCE
          description:
            other: "Enable Proof Key for Code Exchange (S256 method, RFC 7636). Recommended for public clients and required by some modern providers. When enabled, a code_verifier is generated per login and sent in the token exchange."
        skip_tls_verify:
          title:
            other: Skip TLS Verification
          description:
            other: "Disable TLS certificate verification when communicating with the OAuth2/OIDC provider. Only enable for internal or development providers — never in production."
