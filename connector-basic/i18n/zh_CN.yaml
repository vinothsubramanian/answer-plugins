plugin:
  basic_connector:
    backend:
      name:
        other: 通用连接器
      info:
        name:
          other: 通用连接器
        description:
          other: 适用于各种 OAuth 登录的通用插件
      config:
        name:
          title:
            other: 名称
          description:
            other: 在登录页面上显示的连接器名称
        issuer_url:
          title:
            other: Issuer URL
          description:
            other: "可选。OIDC 提供商的 Issuer URL（例如 https://accounts.google.com）。设置后，授权 URL、令牌 URL 和用户 JSON URL 将自动从 {issuer}/.well-known/openid-configuration 获取。手动填写的 URL 字段优先级更高。"
        client_id:
          title:
            other: 客户端ID
          description:
            other: 您的应用程序的客户端ID
        client_secret:
          title:
            other: 客户端密钥
          description:
            other: 您的应用程序的客户端密钥
        authorize_url:
          title:
            other: 授权URL
          description:
            other: "OAuth2 提供商的授权端点。设置 Issuer URL 时可选——同时提供时以此字段为准。"
        token_url:
          title:
            other: 令牌URL
          description:
            other: "OAuth2 提供商的令牌端点。设置 Issuer URL 时可选——同时提供时以此字段为准。"
        user_json_url:
          title:
            other: 用户JSON URL
          description:
            other: "使用访问令牌获取用户信息的 URL。设置 Issuer URL 时可选——提供时将覆盖自动发现的 userinfo 端点。"
        user_id_json_path:
          title:
            other: 用户ID JSON路径
          description:
            other: "OAuth2用户JSON中用户ID的路径。例如：user.id"
        user_display_name_json_path:
          title:
            other: 用户显示名称JSON路径
          description:
            other: "OAuth2用户JSON中用户显示名称的路径。例如：user.name"
        user_username_json_path:
          title:
            other: 用户用户名JSON路径
          description:
            other: "OAuth2用户JSON中用户用户名的路径。例如：user.login"
        user_email_json_path:
          title:
            other: 用户电子邮件JSON路径
          description:
            other: "OAuth2用户JSON中用户电子邮件的路径。例如：user.email"
        user_avatar_json_path:
          title:
            other: 用户头像JSON路径
          description:
            other: "OAuth2用户JSON中用户头像的路径。例如：user.avatar_url"
        check_email_verified:
          title:
            other: 检查电子邮件已验证
          label:
            other: OAuth2网站已经验证了该电子邮件
        email_verified_json_path:
          title:
            other: 电子邮件已验证JSON路径
          description:
            other: "OAuth2用户JSON中电子邮件验证的路径。例如：user.email_verified"
        scope:
          title:
            other: 范围(Scope)
          description:
            other: "您的应用程序的OAuth范围。多个 Scope 以 `,` 分隔，如：user.email,user.age"
        logo_svg:
          title:
            other: 徽标SVG
          description:
            other: "应用程序徽标的SVG格式，格式为base64"
        enable_pkce:
          title:
            other: 启用 PKCE
          description:
            other: "启用代码交换证明密钥（S256 方法，RFC 7636）。推荐用于公共客户端，部分现代提供商要求此功能。启用后，每次登录将生成 code_verifier 并在令牌交换时发送。"
        skip_tls_verify:
          title:
            other: 跳过 TLS 验证
          description:
            other: "禁用与 OAuth2/OIDC 提供商通信时的 TLS 证书验证。仅限内部或开发环境使用，生产环境请勿开启。"